<!DOCTYPE html>
<html>
    <body>
        <h2 id="demo">Hello students</h2>
   
<script>
    let day = 5;
    switch(day){
        case 1 :
        console.log("Monday");
        break;
         case 2 :
        console.log("Tuesday");
        break;
         case 3 :
        console.log("Wednesday");
        break;
         case 4 :
        console.log("Thursday");
        break;
         case 5 :
        console.log("Friday");
        break;
         default :
        console.log("Weekend");
        break;
        

    }
</script>
</body>
</html>
